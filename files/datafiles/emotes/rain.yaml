weather: rain
outdoor:
  default:
    - "Rain patters down steadily around you."
    - "A cold runnel of rainwater finds its way down your neck."
    - "Puddles widen and merge underfoot."
  forest:
    - "Rain drips from leaf to leaf, a thousand small drumbeats."
  city:
    - "Rain sheets from the slate roofs and overwhelms the gutters below."
    - "Cartwheels hiss past on the wet cobblestones, throwing fans of spray."
  shore:
    - "Beneath the rain's hiss, the surf keeps its slower, booming time."
  water:
    - "Silver patches of heavier rain drift across the swells."
  farmland:
    - "The smell of wet earth rises rich from the rain-soaked furrows."
  road:
    - "Wagon ruts brim with brown water; the road is churning to mud."
  swamp:
    - "Rain dimples the stagnant pools and sets the cattails nodding."
indoor:
  default:
    - "Rain drums on the roof overhead."
    - "Water trickles past outside; somewhere a slow drip finds its rhythm."
seasonal:
  winter:
    outdoor:
      default:
        - "Freezing rain rattles off every surface like thrown gravel."
        - "Each drop stings with cold; the puddles film over with slush."
    indoor:
      default:
        - "Icy rain crackles against the roof in waves."
  wet:
    outdoor:
      default:
        - "The downpour is total, a warm wall of water without seams."
    indoor:
      default:
        - "The wet-season deluge drums on the roof without pause."
